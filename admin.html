<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Модератор PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
button:active { transform: scale(0.97); }
.theme-transition { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
input, textarea, select { font-size: 16px !important; } /* Защита от зума на iPhone */
</style>
</head>
<body id="app-body" class="bg-slate-100 min-h-screen p-2 sm:p-6 font-sans text-slate-800 antialiased pb-20 theme-transition">

<div id="app-card" class="max-w-2xl mx-auto rounded-2xl shadow-md border p-4 sm:p-6 theme-transition">

    <!-- Шапка -->
    <div class="flex items-center justify-between pb-3 mb-3 border-b border-black/10">
        <div class="flex items-center gap-2">
            <div class="w-3.5 h-3.5 rounded-full bg-emerald-500 animate-pulse shadow-sm"></div>
            <h1 id="header-title" class="text-xl font-black tracking-tight text-slate-900">Модератор 🛡️</h1>
        </div>

        <div class="flex items-center gap-2">
            <button onclick="toggleSettings()" class="p-2 bg-black/5 hover:bg-black/10 rounded-xl text-slate-700 transition-all active:bg-black/20" title="Настройки">
                ⚙️
            </button>
            <span class="bg-amber-400/30 text-amber-950 px-2.5 py-1 rounded-xl text-xs font-black tracking-wide uppercase shadow-2xs">
                PRO
            </span>
        </div>
    </div>

    <!-- Панель Настроек (⚙️) -->
    <div id="settings-panel" class="hidden mb-4 p-4 bg-white/90 backdrop-blur-md rounded-2xl border border-slate-300 text-xs space-y-4 shadow-lg">
        <div class="flex justify-between items-center border-b pb-2">
            <span class="font-extrabold text-slate-800 text-sm">⚙️ Настройки и Палитра</span>
            <button onclick="toggleSettings()" class="text-slate-400 font-bold hover:text-slate-600">✕ Закрыть</button>
        </div>

        <!-- 🔑 КЛЮЧ ДОСТУПА УБРАН НА ЭТАПЕ РАЗРАБОТКИ (см. шпаргалку, ЭТАП 5 — вернуть перед выкладкой) -->

        <!-- Темы -->
        <div>
            <label class="block font-bold text-slate-700 mb-2">Цвет темы для раздела <span id="current-tab-name" class="text-emerald-600 font-black">«Отзывы»</span>:</label>
            <div class="grid grid-cols-5 gap-1.5 text-center">
                <button onclick="setTabTheme('white')" class="p-2 rounded-xl border-2 border-slate-300 bg-white text-slate-800 font-bold text-[10px]">⚪ Белая</button>
                <button onclick="setTabTheme('dark')" class="p-2 rounded-xl border-2 border-slate-700 bg-slate-900 text-white font-bold text-[10px]">🌙 Тёмная</button>
                <button onclick="setTabTheme('blue')" class="p-2 rounded-xl border-2 border-sky-400 bg-sky-300 text-sky-950 font-black text-[10px]">🩵 Голубой</button>
                <button onclick="setTabTheme('yellow')" class="p-2 rounded-xl border-2 border-amber-400 bg-amber-300 text-amber-950 font-black text-[10px]">💛 Желтый</button>
                <button onclick="setTabTheme('green')" class="p-2 rounded-xl border-2 border-emerald-400 bg-emerald-300 text-emerald-950 font-black text-[10px]">💚 Мята</button>
            </div>
        </div>

        <!-- Лимит -->
        <div>
            <label class="block font-bold text-slate-700 mb-1.5">Показывать карточек на экране:</label>
            <div class="flex gap-2">
                <button onclick="setLimit(15)" id="limit-15" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">15 шт</button>
                <button onclick="setLimit(20)" id="limit-20" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">20 шт</button>
                <button onclick="setLimit(25)" id="limit-25" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">25 шт</button>
            </div>
        </div>

        <!-- Срок хранения -->
        <div>
            <label class="block font-bold text-slate-700 mb-1.5">Хранить архив в базе:</label>
            <div class="flex gap-2">
                <button onclick="setRetention(3)" id="ret-3" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">3 мес</button>
                <button onclick="setRetention(6)" id="ret-6" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">6 мес</button>
                <button onclick="setRetention(12)" id="ret-12" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">12 мес</button>
            </div>
        </div>
    </div>

    <!-- Вкладки -->
    <div class="flex bg-black/5 p-1 rounded-xl mb-4 gap-1 text-xs sm:text-sm font-bold">
        <button id="tab-reviews" onclick="switchTab('reviews')" class="flex-1 py-2 rounded-lg bg-white shadow-xs text-slate-900 transition-all">⭐ Отзывы</button>
        <button id="tab-leads" onclick="switchTab('leads')" class="flex-1 py-2 rounded-lg text-slate-600 hover:text-slate-900 transition-all">📩 Заявки</button>
        <button id="tab-appointments" onclick="switchTab('appointments')" class="flex-1 py-2 rounded-lg text-slate-600 hover:text-slate-900 transition-all">📅 Запись</button>
    </div>

    <!-- Вкладка 1: Отзывы -->
    <div id="content-reviews" class="space-y-4">
        <div id="reviews-container" class="space-y-4"></div>
        <div id="archive-button-container" class="hidden pt-2">
            <button onclick="toggleArchive()" id="archive-btn" class="w-full py-3 bg-black/5 hover:bg-black/10 text-slate-700 rounded-xl font-bold text-xs transition-all flex items-center justify-center gap-2">
                📦 Показать весь архив
            </button>
        </div>
    </div>

    <!-- Вкладка 2: Заявки (Заглушка) -->
    <div id="content-leads" class="hidden text-center py-12">
        <p class="text-4xl mb-2">📥</p>
        <h3 class="font-bold text-slate-800 mb-1">Модуль «Заявки / Лиды»</h3>
        <p class="text-xs text-slate-500 max-w-xs mx-auto">Скоро здесь будут контакты с форм</p>
    </div>

    <!-- Вкладка 3: Запись (Заглушка) -->
    <div id="content-appointments" class="hidden text-center py-12">
        <p class="text-4xl mb-2">📆</p>
        <h3 class="font-bold text-slate-800 mb-1">Модуль «Онлайн-запись»</h3>
        <p class="text-xs text-slate-500 max-w-xs mx-auto">Скоро здесь будет календарь бронирований</p>
    </div>

</div>

<script>
    const API_URL = 'https://rental-scarcity-bagging.ngrok-free.dev';
    let allReviews = [];
    let showFullArchive = false;
    let currentTab = 'reviews';

    let displayLimit = parseInt(localStorage.getItem('admin_limit')) || 20;
    let retentionMonths = parseInt(localStorage.getItem('admin_retention')) || 6;

    // 🧠 Для умного автообновления: чтобы не перерисовывать, если ничего не изменилось
    let lastDataSignature = '';

    let tabThemes = {
        reviews: localStorage.getItem('theme_reviews') || 'blue',
        leads: localStorage.getItem('theme_leads') || 'yellow',
        appointments: localStorage.getItem('theme_appointments') || 'green'
    };

    const themeStyles = {
        white: { body: 'bg-slate-100', card: 'bg-white border-slate-200/80', text: 'text-slate-900' },
        dark: { body: 'bg-slate-950', card: 'bg-slate-900 border-slate-800 text-white', text: 'text-white' },
        blue: { body: 'bg-sky-200/90', card: 'bg-sky-50/90 border-sky-300 shadow-sky-100', text: 'text-sky-950' },
        yellow: { body: 'bg-amber-200/90', card: 'bg-amber-50/90 border-amber-300 shadow-amber-100', text: 'text-amber-950' },
        green: { body: 'bg-emerald-200/90', card: 'bg-emerald-50/90 border-emerald-300 shadow-emerald-100', text: 'text-emerald-950' }
    };

    // ================= 🛡️ ЗАЩИТА ОТ XSS =================
    function esc(s) {
        return String(s ?? '').replace(/[&<>"']/g, c =>
            ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ================= 🕒 КРАСИВАЯ ДАТА =================
    function prettyDate(iso) {
        if (!iso) return 'Недавно';
        const d = new Date(iso);
        if (isNaN(d)) return esc(iso); // старый формат — покажем как есть

        const now = new Date();
        const diffMin = Math.round((now - d) / 60000);

        if (diffMin < 1) return 'Только что';
        if (diffMin < 60) return `${diffMin} мин назад`;
        if (diffMin < 1440) { // меньше суток
            const h = Math.floor(diffMin / 60);
            return `${h} ч назад`;
        }
        return d.toLocaleString('ru-RU', {
            day: 'numeric', month: 'short',
            hour: '2-digit', minute: '2-digit'
        }); // → "8 дек, 14:30"
    }

    // Точное время до секунды (для title / всплывающей подсказки)
    function fullDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d)) return esc(iso);
        return d.toLocaleString('ru-RU', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    // ================= ⭐ ЗВЁЗДЫ РЕЙТИНГА =================
    function stars(rating) {
        const r = Math.max(0, Math.min(5, parseInt(rating) || 0));
        return '★'.repeat(r) + '☆'.repeat(5 - r);
    }

    function applyTheme(themeName) {
        const body = document.getElementById('app-body');
        const card = document.getElementById('app-card');
        const title = document.getElementById('header-title');

        body.className = `min-h-screen p-2 sm:p-6 font-sans antialiased pb-20 theme-transition ${themeStyles[themeName].body}`;
        card.className = `max-w-2xl mx-auto rounded-2xl shadow-md border p-4 sm:p-6 theme-transition ${themeStyles[themeName].card}`;
        title.className = `text-xl font-black tracking-tight ${themeStyles[themeName].text}`;
    }

    function setTabTheme(themeName) {
        tabThemes[currentTab] = themeName;
        localStorage.setItem(`theme_${currentTab}`, themeName);
        applyTheme(themeName);
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.classList.toggle('hidden');
        updateSettingsUI();
    }

    function setLimit(val) {
        displayLimit = val;
        localStorage.setItem('admin_limit', val);
        updateSettingsUI();
        forceRender();
    }

    function setRetention(val) {
        retentionMonths = val;
        localStorage.setItem('admin_retention', val);
        updateSettingsUI();
    }

    function updateSettingsUI() {
        const names = { reviews: '«Отзывы»', leads: '«Заявки»', appointments: '«Запись»' };
        document.getElementById('current-tab-name').innerText = names[currentTab];

        [15, 20, 25].forEach(l => {
            const btn = document.getElementById(`limit-${l}`);
            if (btn) btn.className = (l === displayLimit)
                ? 'flex-1 py-1.5 rounded-lg border-2 border-emerald-500 font-extrabold bg-emerald-50 text-emerald-800'
                : 'flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700';
        });

        [3, 6, 12].forEach(r => {
            const btn = document.getElementById(`ret-${r}`);
            if (btn) btn.className = (r === retentionMonths)
                ? 'flex-1 py-1.5 rounded-lg border-2 border-amber-500 font-extrabold bg-amber-50 text-amber-800'
                : 'flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700';
        });
    }

    function switchTab(tabName) {
        currentTab = tabName;
        document.getElementById('content-reviews').classList.add('hidden');
        document.getElementById('content-leads').classList.add('hidden');
        document.getElementById('content-appointments').classList.add('hidden');

        ['reviews', 'leads', 'appointments'].forEach(tab => {
            document.getElementById(`tab-${tab}`).className = 'flex-1 py-2 rounded-lg text-slate-600 hover:text-slate-900 transition-all font-bold';
        });

        document.getElementById(`content-${tabName}`).classList.remove('hidden');
        document.getElementById(`tab-${tabName}`).className = 'flex-1 py-2 rounded-lg bg-white shadow-xs text-slate-900 font-extrabold transition-all';

        applyTheme(tabThemes[tabName]);
        updateSettingsUI();
    }

    // ================= 🧠 УМНОЕ АВТООБНОВЛЕНИЕ =================
    // Проверяем, занят ли админ сейчас (чтобы не стереть его набранный текст)
    function isAdminBusy() {
        // 1. Открыта панель настроек
        const settings = document.getElementById('settings-panel');
        if (settings && !settings.classList.contains('hidden')) return true;

        // 2. Курсор стоит в поле ввода / текстовом поле
        const el = document.activeElement;
        if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) return true;

        // 3. Открыт хоть один редактор ответа (✏️ Изменить)
        const openEditor = document.querySelector('[id^="reply-edit-"]:not(.hidden)');
        if (openEditor) return true;

        // 4. В любом поле ответа уже что-то напечатано (не потерять черновик)
        const typedInReply = Array.from(document.querySelectorAll('[id^="reply-"]'))
            .some(inp => (inp.tagName === 'INPUT') && inp.value.trim() !== '');
        if (typedInReply) return true;

        return false;
    }

    // Подпись данных — если не изменилась, не трогаем DOM
    function dataSignature(list) {
        return list.map(r => `${r.id}:${r.status}:${r.admin_answer || ''}`).join('|');
    }

    // Автообновление: тихо тянем данные, перерисовываем только если можно и есть смысл
    async function autoRefresh() {
        if (currentTab !== 'reviews') return; // обновляем только активную вкладку «Отзывы»
        if (isAdminBusy()) return;             // админ печатает — не мешаем

        try {
            const response = await fetch(`${API_URL}/api/reviews?ngrok-skip-browser-warning=true`, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            const fresh = await response.json();
            const sig = dataSignature(fresh);
            if (sig !== lastDataSignature) {  // данные реально изменились
                allReviews = fresh;
                renderReviews();
            }
        } catch (e) {
            console.error('Автообновление: ошибка сети', e);
        }
    }

    // Обычная загрузка (после действий админа или при старте) — рисуем всегда
    async function loadReviews() {
        try {
            const response = await fetch(`${API_URL}/api/reviews?ngrok-skip-browser-warning=true`, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            allReviews = await response.json();
            renderReviews();
        } catch (e) {
            console.error('Ошибка:', e);
        }
    }

    // Перерисовка без запроса к серверу (для смены лимита/архива)
    function forceRender() {
        renderReviews();
    }

    // Единая обработка ответа админ-запроса
    async function handleAdminResponse(res) {
        if (!res.ok) {
            alert('❌ Ошибка сервера. Попробуйте позже.');
            return false;
        }
        loadReviews();
        return true;
    }

    function renderReviews() {
        const container = document.getElementById('reviews-container');
        const archiveBtnContainer = document.getElementById('archive-button-container');
        const archiveBtn = document.getElementById('archive-btn');
        container.innerHTML = '';

        // фиксируем подпись отрисованных данных (для умного автообновления)
        lastDataSignature = dataSignature(allReviews);

        if (allReviews.length === 0) {
            container.innerHTML = `<div class="text-center py-12"><p class="text-4xl mb-2">☕</p><p class="text-gray-400 font-medium text-sm">Новых отзывов нет</p></div>`;
            archiveBtnContainer.classList.add('hidden');
            return;
        }

        const reviewsToDisplay = showFullArchive ? allReviews : allReviews.slice(0, displayLimit);

        if (allReviews.length > displayLimit) {
            archiveBtnContainer.classList.remove('hidden');
            const hiddenCount = allReviews.length - displayLimit;
            archiveBtn.innerText = showFullArchive
                ? "🔼 Свернуть архив"
                : `📦 Показать архив (ещё ${hiddenCount})`;
        } else {
            archiveBtnContainer.classList.add('hidden');
        }

        reviewsToDisplay.forEach(review => {
            const isApproved = review.status === 'approved';
            const reviewDiv = document.createElement('div');

            reviewDiv.className = `p-4 sm:p-5 rounded-xl border transition-all ${
                isApproved ? 'bg-white/90 border-slate-200/90 shadow-2xs' : 'bg-amber-100/90 border-amber-300 shadow-sm'
            }`;

            let adminBlock = '';
            if (!isApproved) {
                adminBlock = `
                <div class="mt-4 pt-3 border-t border-amber-300/60 flex flex-col gap-2 sm:gap-3">
                    <button onclick="approveOnly(${review.id})" class="w-full bg-emerald-600 text-white py-3 px-4 rounded-xl font-bold text-sm hover:bg-emerald-700 transition-all shadow-sm active:bg-emerald-800">
                        ✓ Одобрить без ответа
                    </button>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="reply-${review.id}" placeholder="Ваш ответ..." class="w-full border border-amber-300 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 bg-white text-slate-800">
                        <button onclick="sendReply(${review.id})" class="w-full sm:w-auto bg-amber-500 text-white py-3 px-5 rounded-xl font-bold text-sm hover:bg-amber-600 transition-all shadow-sm active:bg-amber-700 whitespace-nowrap">
                            Ответить
                        </button>
                    </div>
                </div>`;
            } else if (review.admin_answer) {
                adminBlock = `
                <div class="mt-3 bg-slate-50 p-3 rounded-lg border-l-4 border-emerald-500 shadow-2xs">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-[10px] text-emerald-600 font-extrabold uppercase tracking-wider">Ответ организации</p>
                        <button onclick="toggleEditReply(${review.id})" class="text-slate-400 hover:text-amber-600 text-[11px] font-bold transition-colors">✏️ Изменить</button>
                    </div>

                    <div id="reply-view-${review.id}">
                        <p class="text-sm text-slate-700 font-medium">${esc(review.admin_answer)}</p>
                    </div>

                    <div id="reply-edit-${review.id}" class="hidden mt-2 space-y-2">
                                                <input type="text" id="edit-input-${review.id}" value="${esc(review.admin_answer)}" class="w-full border border-amber-300 p-2.5 rounded-xl text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-amber-500">
                        <div class="flex gap-2 justify-end">
                            <button onclick="toggleEditReply(${review.id})" class="px-3 py-1.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg text-xs font-bold">Отмена</button>
                            <button onclick="saveEditedReply(${review.id})" class="px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white rounded-lg text-xs font-bold shadow-2xs">Сохранить</button>
                        </div>
                    </div>
                </div>`;
            } else {
                adminBlock = `
                <div class="mt-3 pt-2 border-t border-slate-200/80">
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="reply-${review.id}" placeholder="Ответить клиенту..." class="w-full border border-slate-300 p-2.5 rounded-xl text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <button onclick="sendReply(${review.id})" class="w-full sm:w-auto bg-emerald-600 text-white py-2.5 px-5 rounded-xl font-bold text-xs hover:bg-emerald-700 transition-all shadow-sm active:bg-emerald-800 whitespace-nowrap">
                            Ответить
                        </button>
                    </div>
                </div>`;
            }

            reviewDiv.innerHTML = `
                <div class="flex justify-between items-start gap-3">
                    <div class="min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h3 class="font-extrabold text-slate-900 truncate">${esc(review.author_name)}</h3>
                            ${isApproved
                                ? '<span class="text-[10px] bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded-full">Опубликован</span>'
                                : '<span class="text-[10px] bg-amber-200 text-amber-800 font-bold px-2 py-0.5 rounded-full animate-pulse">На модерации</span>'}
                        </div>
                        <p class="text-amber-500 text-sm mt-0.5 tracking-wide" title="${review.rating || 0} из 5">
                            ${stars(review.rating)}
                        </p>
                    </div>
                    <span class="text-[11px] text-slate-400 font-medium whitespace-nowrap shrink-0" title="${fullDate(review.created_at)}">
                        🕒 ${prettyDate(review.created_at)}
                    </span>
                </div>

                <p class="text-slate-700 mt-2 text-sm leading-relaxed break-words">${esc(review.text)}</p>

                ${adminBlock}

                <div class="mt-3 text-right">
                    <button onclick="deleteReview(${review.id})" class="text-slate-400 hover:text-red-500 text-[11px] font-bold transition-colors">
                        🗑️ Удалить отзыв
                    </button>
                </div>
            `;

            container.appendChild(reviewDiv);
        });
    }

    // ================= 📦 АРХИВ =================
    function toggleArchive() {
        showFullArchive = !showFullArchive;
        renderReviews();
    }

    // ================= ✏️ РЕДАКТИРОВАНИЕ ОТВЕТА =================
    function toggleEditReply(id) {
        document.getElementById(`reply-view-${id}`).classList.toggle('hidden');
        document.getElementById(`reply-edit-${id}`).classList.toggle('hidden');
    }

    async function saveEditedReply(id) {
        const value = document.getElementById(`edit-input-${id}`).value.trim();
        if (!value) { alert('Ответ не может быть пустым.'); return; }

        const res = await fetch(`${API_URL}/api/reviews/${id}/reply`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
            body: JSON.stringify({ admin_answer: value })
        });
        await handleAdminResponse(res);
    }

    // ================= ✅ ОДОБРИТЬ БЕЗ ОТВЕТА =================
    async function approveOnly(id) {
        const res = await fetch(`${API_URL}/api/reviews/${id}/approve`, {
            method: 'PUT',
            headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        await handleAdminResponse(res);
    }

    // ================= 💬 ОТВЕТИТЬ (одобрить с ответом) =================
    async function sendReply(id) {
        const input = document.getElementById(`reply-${id}`);
        const value = input.value.trim();
        if (!value) { alert('Введите текст ответа.'); return; }

        const res = await fetch(`${API_URL}/api/reviews/${id}/reply`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
            body: JSON.stringify({ admin_answer: value })
        });
        await handleAdminResponse(res);
    }

    // ================= 🗑️ УДАЛИТЬ =================
    async function deleteReview(id) {
        if (!confirm('Удалить этот отзыв навсегда?')) return;

        const res = await fetch(`${API_URL}/api/reviews/${id}`, {
            method: 'DELETE',
            headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        await handleAdminResponse(res);
    }

    // ================= 🚀 ЗАПУСК =================
    window.addEventListener('DOMContentLoaded', () => {
        switchTab('reviews');   // применяет тему + UI настроек
        loadReviews();
        // 🧠 УМНОЕ автообновление списка каждые 30 сек
        // (не мешает, если админ печатает / открыт редактор / открыты настройки)
        setInterval(autoRefresh, 30000);
    });
</script>
