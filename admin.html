<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Модератор</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 font-sans">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-slate-800">SaaS Модератор 🛡️</h1>
            <span class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-semibold">Панель управления</span>
        </div>
        
        <div id="reviews-container" class="space-y-6">
            <!-- Отзывы будут загружаться сюда -->
        </div>
    </div>

    <script>
        const API_URL = 'https://rental-scarcity-bagging.ngrok-free.dev';

        // Функция загрузки отзывов
        async function loadReviews() {
            try {
                // Добавили header для обхода заглушки ngrok
                const response = await fetch(`${API_URL}/api/reviews`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const reviews = await response.json();
                const container = document.getElementById('reviews-container');
                container.innerHTML = '';

                if (reviews.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-8">Отзывов пока нет.</p>';
                    return;
                }

                reviews.forEach(review => {
                    const isApproved = review.status === 'approved';
                    const reviewDiv = document.createElement('div');
                    
                    reviewDiv.className = `p-6 border rounded-xl shadow-sm transition-all ${isApproved ? 'bg-slate-50 border-slate-200' : 'bg-orange-50 border-orange-200'}`;
                    
                    let adminBlock = '';
                    if (!isApproved) {
                        adminBlock = `
                        <div class="mt-5 flex flex-wrap gap-3">
                            <button onclick="approveOnly(${review.id})" class="bg-emerald-500 text-white px-5 py-3 rounded-lg hover:bg-emerald-600 font-semibold transition-colors shadow-sm whitespace-nowrap">
                                ✓ Одобрить (без ответа)
                            </button>
                            <div class="flex-1 flex gap-3 min-w-[300px]">
                                <input type="text" id="reply-${review.id}" placeholder="Или напишите ответ..." class="flex-1 border border-orange-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 text-gray-700">
                                <button onclick="sendReply(${review.id})" class="bg-orange-500 text-white px-6 py-3 rounded-lg hover:bg-orange-600 font-semibold transition-colors shadow-sm">
                                    Ответить
                                </button>
                            </div>
                        </div>`;
                    } else if (review.admin_answer) {
                        adminBlock = `
                        <div class="mt-5 bg-white p-4 border-l-4 border-emerald-400 rounded-r-lg shadow-sm">
                            <p class="text-xs text-emerald-600 font-bold uppercase mb-1">Ответ Зеркала:</p>
                            <p class="text-gray-800">${review.admin_answer}</p>
                        </div>`;
                    }

                    reviewDiv.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-xl text-gray-800">${review.author_name}</h3>
                                <p class="text-gray-700 mt-2 text-lg">${review.text}</p>
                            </div>
                            
                            <div class="flex flex-col items-end gap-3">
                                <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide ${isApproved ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-200 text-orange-800'}">
                                    ${isApproved ? '✓ Опубликован' : 'Ожидает модерации'}
                                </span>
                                <button onclick="deleteReview(${review.id})" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1 rounded transition-colors text-sm font-semibold flex items-center gap-1">
                                    🗑️ Удалить
                                </button>
                            </div>
                        </div>
                        ${adminBlock}
                    `;
                    container.appendChild(reviewDiv);
                });
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }

        // Функция ответа
        async function sendReply(id) {
            const input = document.getElementById(`reply-${id}`);
            const answer = input.value.trim();
            if (!answer) { alert('Напишите ответ!'); return; }

            const res = await fetch(`${API_URL}/api/reviews/${id}/reply`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify({ admin_answer: answer })
            });

            if (res.ok) loadReviews();
        }

        // Функция "Просто одобрить"
        async function approveOnly(id) {
            const res = await fetch(`${API_URL}/api/reviews/${id}/approve`, { 
                method: 'PUT',
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            if (res.ok) loadReviews();
        }

        // Функция удаления отзыва
        async function deleteReview(id) {
            const isConfirmed = confirm("Вы уверены, что хотите навсегда удалить этот отзыв?");
            
            if (isConfirmed) {
                const res = await fetch(`${API_URL}/api/reviews/${id}`, { 
                    method: 'DELETE',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                if (res.ok) {
                    loadReviews();
                } else {
                    alert('Произошла ошибка при удалении!');
                }
            }
        }

        loadReviews();
    </script>
</body>
</html>
