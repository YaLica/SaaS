<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Модератор PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
button:active { transform: scale(0.97); }
.theme-transition { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
input, textarea, select { font-size: 16px !important; }
</style>
</head>
<body id="app-body" class="bg-slate-100 min-h-screen p-2 sm:p-6 font-sans text-slate-800 antialiased pb-20 theme-transition">

<!-- ================= 🔒 ЭКРАН ВХОДА ================= -->
<div id="login-screen" class="max-w-sm mx-auto mt-20">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-6 text-center">
        <div class="text-5xl mb-3">🛡️</div>
        <h1 class="text-xl font-black text-slate-900 mb-1">Модератор PRO</h1>
        <p class="text-xs text-slate-500 mb-5">Введите код доступа</p>
        <input type="password" id="login-code" inputmode="numeric" placeholder="• • • •"
            class="w-full text-center tracking-[0.5em] text-2xl font-black border-2 border-slate-300 rounded-xl py-3 mb-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800"
            onkeydown="if(event.key==='Enter') doLogin()">
        <p id="login-error" class="hidden text-red-500 text-xs font-bold mb-3"></p>
        <button onclick="doLogin()" id="login-btn"
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold transition-all active:bg-emerald-800 shadow-sm">
            Войти
        </button>
    </div>
</div>

<!-- ================= 🖥️ ОСНОВНАЯ АДМИНКА ================= -->
<div id="app-card" class="hidden max-w-2xl mx-auto rounded-2xl shadow-md border p-4 sm:p-6 theme-transition">

    <!-- Шапка -->
    <div class="flex items-center justify-between pb-3 mb-3 border-b border-black/10">
        <div class="flex items-center gap-2">
            <div class="w-3.5 h-3.5 rounded-full bg-emerald-500 animate-pulse shadow-sm"></div>
            <h1 id="header-title" class="text-xl font-black tracking-tight text-slate-900">Модератор 🛡️</h1>
        </div>
        <div class="flex items-center gap-2">
            <!-- 🏠 Панель владельца — видна ТОЛЬКО владельцу -->
            <button id="owner-btn" onclick="goToOwner()" class="hidden px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold transition-all active:bg-indigo-800" title="Панель владельца">
                🏠 Владелец
            </button>
            <button id="settings-gear" onclick="toggleSettings()" class="hidden p-2 bg-black/5 hover:bg-black/10 rounded-xl text-slate-700 transition-all active:bg-black/20" title="Настройки">
                ⚙️
            </button>
            <span class="bg-amber-400/30 text-amber-950 px-2.5 py-1 rounded-xl text-xs font-black tracking-wide uppercase shadow-2xs">PRO</span>
            <button onclick="doLogout()" class="p-2 bg-black/5 hover:bg-black/10 rounded-xl text-slate-700 transition-all active:bg-black/20" title="Выйти">🚪</button>
        </div>
    </div>

    <!-- Панель Настроек -->
    <div id="settings-panel" class="hidden mb-4 p-4 bg-white/90 backdrop-blur-md rounded-2xl border border-slate-300 text-xs space-y-4 shadow-lg">
        <div class="flex justify-between items-center border-b pb-2">
            <span class="font-extrabold text-slate-800 text-sm">⚙️ Настройки и Палитра</span>
            <button onclick="toggleSettings()" class="text-slate-400 font-bold hover:text-slate-600">✕ Закрыть</button>
        </div>
        <div>
            <label class="block font-bold text-slate-700 mb-2">Цвет темы для раздела <span id="current-tab-name" class="text-emerald-600 font-black">«Отзывы»</span>:</label>
            <div class="grid grid-cols-5 gap-1.5 text-center">
                <button onclick="setTabTheme('white')" class="p-2 rounded-xl border-2 border-slate-300 bg-white text-slate-800 font-bold text-[10px]">⚪ Белая</button>
                <button onclick="setTabTheme('dark')" class="p-2 rounded-xl border-2 border-slate-700 bg-slate-900 text-white font-bold text-[10px]">🌙 Тёмная</button>
                <button onclick="setTabTheme('blue')" class="p-2 rounded-xl border-2 border-sky-400 bg-sky-300 text-sky-950 font-black text-[10px]">🩵 Голубой</button>
                <button onclick="setTabTheme('yellow')" class="p-2 rounded-xl border-2 border-amber-400 bg-amber-300 text-amber-950 font-black text-[10px]">💛 Желтый</button>
                <button onclick="setTabTheme('green')" class="p-2 rounded-xl border-2 border-emerald-400 bg-emerald-300 text-emerald-950 font-black text-[10px]">💚 Мята</button>
            </div>
        </div>
        <div>
            <label class="block font-bold text-slate-700 mb-1.5">Показывать карточек на экране:</label>
            <div class="flex gap-2">
                <button onclick="setLimit(15)" id="limit-15" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">15 шт</button>
                <button onclick="setLimit(20)" id="limit-20" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">20 шт</button>
                <button onclick="setLimit(25)" id="limit-25" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">25 шт</button>
            </div>
        </div>
        <div>
            <label class="block font-bold text-slate-700 mb-1.5">Хранить архив в базе:</label>
            <div class="flex gap-2">
                <button onclick="setRetention(3)" id="ret-3" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">3 мес</button>
                <button onclick="setRetention(6)" id="ret-6" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">6 мес</button>
                <button onclick="setRetention(12)" id="ret-12" class="flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700">12 мес</button>
            </div>
        </div>
    </div>

    <!-- Вкладки -->
    <div class="flex bg-black/5 p-1 rounded-xl mb-4 gap-1 text-xs sm:text-sm font-bold">
        <button id="tab-reviews" onclick="switchTab('reviews')" class="flex-1 py-2 rounded-lg bg-white shadow-xs text-slate-900 transition-all">⭐ Отзывы</button>
        <button id="tab-leads" onclick="switchTab('leads')" class="flex-1 py-2 rounded-lg text-slate-600 hover:text-slate-900 transition-all">📩 Заявки</button>
        <button id="tab-appointments" onclick="switchTab('appointments')" class="flex-1 py-2 rounded-lg text-slate-600 hover:text-slate-900 transition-all">📅 Запись</button>
    </div>

    <!-- Отзывы -->
    <div id="content-reviews" class="space-y-4">
        <div id="reviews-container" class="space-y-4"></div>
        <div id="archive-button-container" class="hidden pt-2">
            <button onclick="toggleArchive()" id="archive-btn" class="w-full py-3 bg-black/5 hover:bg-black/10 text-slate-700 rounded-xl font-bold text-xs transition-all flex items-center justify-center gap-2">📦 Показать весь архив</button>
        </div>
    </div>

    <div id="content-leads" class="hidden text-center py-12">
        <p class="text-4xl mb-2">📥</p>
        <h3 class="font-bold text-slate-800 mb-1">Модуль «Заявки / Лиды»</h3>
        <p class="text-xs text-slate-500 max-w-xs mx-auto">Скоро здесь будут контакты с форм</p>
    </div>
    <div id="content-appointments" class="hidden text-center py-12">
        <p class="text-4xl mb-2">📆</p>
        <h3 class="font-bold text-slate-800 mb-1">Модуль «Онлайн-запись»</h3>
        <p class="text-xs text-slate-500 max-w-xs mx-auto">Скоро здесь будет календарь бронирований</p>
    </div>
</div>

<script>
    const API_URL = 'https://rental-scarcity-bagging.ngrok-free.dev';
    let allReviews = [];
    let showFullArchive = false;
    let currentTab = 'reviews';
    let currentRole = null;
    let displayLimit = parseInt(localStorage.getItem('admin_limit')) || 20;
    let retentionMonths = parseInt(localStorage.getItem('admin_retention')) || 6;
    let lastDataSignature = '';

    let tabThemes = {
        reviews: localStorage.getItem('theme_reviews') || 'blue',
        leads: localStorage.getItem('theme_leads') || 'yellow',
        appointments: localStorage.getItem('theme_appointments') || 'green'
    };
    const themeStyles = {
        white: { body: 'bg-slate-100', card: 'bg-white border-slate-200/80', text: 'text-slate-900' },
        dark: { body: 'bg-slate-950', card: 'bg-slate-900 border-slate-800 text-white', text: 'text-white' },
        blue: { body: 'bg-sky-200/90', card: 'bg-sky-50/90 border-sky-300 shadow-sky-100', text: 'text-sky-950' },
        yellow: { body: 'bg-amber-200/90', card: 'bg-amber-50/90 border-amber-300 shadow-amber-100', text: 'text-amber-950' },
        green: { body: 'bg-emerald-200/90', card: 'bg-emerald-50/90 border-emerald-300 shadow-emerald-100', text: 'text-emerald-950' }
    };

    async function doLogin() {
        const code = document.getElementById('login-code').value.trim();
        const errorEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');
        if (!code) { errorEl.innerText = 'Введите код'; errorEl.classList.remove('hidden'); return; }
        btn.disabled = true; btn.innerText = 'Проверяем...'; errorEl.classList.add('hidden');
        try {
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({ access_code: code })
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                errorEl.innerText = err.detail || 'Неверный код доступа';
                errorEl.classList.remove('hidden');
                btn.disabled = false; btn.innerText = 'Войти'; return;
            }
            const user = await res.json();
            currentRole = user.role;
            sessionStorage.setItem('session_role', user.role);
            sessionStorage.setItem('session_name', user.name);
            enterApp();
        } catch (e) {
            errorEl.innerText = 'Ошибка сети. Проверьте сервер.';
            errorEl.classList.remove('hidden');
            btn.disabled = false; btn.innerText = 'Войти';
        }
    }

    function doLogout() {
        sessionStorage.removeItem('session_role');
        sessionStorage.removeItem('session_name');
        currentRole = null;
        location.reload();
    }

    function goToOwner() { window.location.href = 'owner.html'; }

    function enterApp() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-card').classList.remove('hidden');
        const gear = document.getElementById('settings-gear');
        const ownerBtn = document.getElementById('owner-btn');
        if (currentRole === 'owner') {
            gear.classList.remove('hidden');
            ownerBtn.classList.remove('hidden');
        } else {
            gear.classList.add('hidden');
            ownerBtn.classList.add('hidden');
        }
        switchTab('reviews');
        loadReviews();
        setInterval(autoRefresh, 30000);
    }

    function esc(s) {
        return String(s ?? '').replace(/[&<>"']/g, c =>
            ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function prettyDate(iso) {
        if (!iso) return 'Недавно';
        const d = new Date(iso);
        if (isNaN(d)) return esc(iso);
        const now = new Date();
        const diffMin = Math.round((now - d) / 60000);
        if (diffMin < 1) return 'Только что';
        if (diffMin < 60) return `${diffMin} мин назад`;
        if (diffMin < 1440) return `${Math.floor(diffMin/60)} ч назад`;
        return d.toLocaleString('ru-RU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    }
    function fullDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d)) return esc(iso);
        return d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }
    function stars(rating) {
        const r = Math.max(0, Math.min(5, parseInt(rating) || 0));
        return '★'.repeat(r) + '☆'.repeat(5 - r);
    }
    function applyTheme(t) {
        const body = document.getElementById('app-body');
        const card = document.getElementById('app-card');
        const title = document.getElementById('header-title');
        body.className = `min-h-screen p-2 sm:p-6 font-sans antialiased pb-20 theme-transition ${themeStyles[t].body}`;
        card.className = `max-w-2xl mx-auto rounded-2xl shadow-md border p-4 sm:p-6 theme-transition ${themeStyles[t].card}`;
        title.className = `text-xl font-black tracking-tight ${themeStyles[t].text}`;
    }
    function setTabTheme(t) {
        tabThemes[currentTab] = t;
        localStorage.setItem(`theme_${currentTab}`, t);
        applyTheme(t);
    }
    function toggleSettings() {
        if (currentRole !== 'owner') return;
        document.getElementById('settings-panel').classList.toggle('hidden');
        updateSettingsUI();
    }
    function setLimit(v) { displayLimit=v; localStorage.setItem('admin_limit',v); updateSettingsUI(); renderReviews(); }
    function setRetention(v) { retentionMonths=v; localStorage.setItem('admin_retention',v); updateSettingsUI(); }
    function updateSettingsUI() {
        const names = { reviews:'«Отзывы»', leads:'«Заявки»', appointments:'«Запись»' };
        document.getElementById('current-tab-name').innerText = names[currentTab];
        [15,20,25].forEach(l => {
            const b = document.getElementById(`limit-${l}`);
            if (b) b.className = (l===displayLimit) ? 'flex-1 py-1.5 rounded-lg border-2 border-emerald-500 font-extrabold bg-emerald-50 text-emerald-800' : 'flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700';
        });
        [3,6,12].forEach(r => {
            const b = document.getElementById(`ret-${r}`);
            if (b) b.className = (r===retentionMonths) ? 'flex-1 py-1.5 rounded-lg border-2 border-amber-500 font-extrabold bg-amber-50 text-amber-800' : 'flex-1 py-1.5 rounded-lg border font-bold bg-white text-slate-700';
        });
    }
    function switchTab(t) {
        currentTab = t;
        ['reviews','leads','appointments'].forEach(x => {
            document.getElementById(`content-${x}`).classList.add('hidden');
            document.getElementById(`tab-${x}`).className = 'flex-1 py-2 rounded-lg text-slate-600 hover:text-slate-900 transition-all font-bold';
        });
        document.getElementById(`content-${t}`).classList.remove('hidden');
        document.getElementById(`tab-${t}`).className = 'flex-1 py-2 rounded-lg bg-white shadow-xs text-slate-900 font-extrabold transition-all';
        applyTheme(tabThemes[t]);
        updateSettingsUI();
    }
    function isAdminBusy() {
        const s = document.getElementById('settings-panel');
        if (s && !s.classList.contains('hidden')) return true;
        const el = document.activeElement;
        if (el && (el.tagName==='INPUT'||el.tagName==='TEXTAREA')) return true;
        if (document.querySelector('[id^="reply-edit-"]:not(.hidden)')) return true;
        if (Array.from(document.querySelectorAll('[id^="reply-"]')).some(i => i.tagName==='TEXTAREA' && i.value.trim()!=='')) return true;
        return false;
    }
    function dataSignature(list) {
        return list.map(r => `${r.id}:${r.status}:${r.admin_answer||''}`).join('|');
    }
    async function autoRefresh() {
        if (currentTab !== 'reviews' || isAdminBusy()) return;
        try {
            const res = await fetch(`${API_URL}/api/reviews?ngrok-skip-browser-warning=true`, { headers:{'ngrok-skip-browser-warning':'true'} });
            const fresh = await res.json();
            const sig = dataSignature(fresh);
            if (sig !== lastDataSignature) { allReviews = fresh; renderReviews(); }
        } catch (e) { console.error(e); }
    }
    async function loadReviews() {
        try {
            const res = await fetch(`${API_URL}/api/reviews?ngrok-skip-browser-warning=true`, { headers:{'ngrok-skip-browser-warning':'true'} });
            allReviews = await res.json();
            renderReviews();
        } catch (e) { console.error(e); }
    }
    async function handleAdminResponse(res) {
        if (!res.ok) { alert('❌ Ошибка сервера'); return false; }
        loadReviews(); return true;
    }
    function renderReviews() {
        const container = document.getElementById('reviews-container');
        const abc = document.getElementById('archive-button-container');
        const ab = document.getElementById('archive-btn');
        container.innerHTML = '';
        lastDataSignature = dataSignature(allReviews);
        if (allReviews.length === 0) {
            container.innerHTML = `<div class="text-center py-12"><p class="text-4xl mb-2">☕</p><p class="text-gray-400 font-medium text-sm">Новых отзывов нет</p></div>`;
            abc.classList.add('hidden'); return;
        }
        const list = showFullArchive ? allReviews : allReviews.slice(0, displayLimit);
        if (allReviews.length > displayLimit) {
            abc.classList.remove('hidden');
            ab.innerText = showFullArchive ? '🔼 Свернуть архив' : `📦 Показать весь архив (${allReviews.length})`;
        } else { abc.classList.add('hidden'); }

        list.forEach(review => {
            const isPending = review.status === 'pending';
            const hasAnswer = review.admin_answer && review.admin_answer.trim() !== '';
            const card = document.createElement('div');
            card.className = 'bg-white/80 rounded-2xl border border-slate-200 p-4 shadow-sm theme-transition';
            let answerBlock = hasAnswer ? `
                <div class="mt-3 pl-3 border-l-2 border-emerald-400 bg-emerald-50/60 rounded-r-lg py-2 pr-2">
                    <p class="text-[10px] font-black text-emerald-700 uppercase tracking-wide mb-0.5">Ваш ответ:</p>
                    <p class="text-xs text-slate-700">${esc(review.admin_answer)}</p>
                </div>` : '';
            let actionsBlock = isPending ? `
                <div class="mt-3 space-y-2">
                    <div class="hidden" id="reply-edit-${review.id}">
                        <textarea id="reply-${review.id}" rows="2" placeholder="Напишите ответ клиенту..." class="w-full text-sm border-2 border-slate-300 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800"></textarea>
                                             <div class="flex gap-2" id="reply-actions-${review.id}">
                        <button onclick="approveReview(${review.id})" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-xl font-bold text-xs">✅ Одобрить</button>
                        <button onclick="toggleReplyBox(${review.id})" class="flex-1 bg-sky-600 hover:bg-sky-700 text-white py-2 rounded-xl font-bold text-xs">💬 Ответить</button>
                        <button onclick="deleteReview(${review.id})" class="px-3 bg-red-500 hover:bg-red-600 text-white py-2 rounded-xl font-bold text-xs">🗑️</button>
                    </div>
                </div>` : `
                <div class="mt-3 space-y-2">
                    <div class="hidden" id="reply-edit-${review.id}">
                        <textarea id="reply-${review.id}" rows="2" placeholder="Измените ответ..." class="w-full text-sm border-2 border-slate-300 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800">${esc(review.admin_answer || '')}</textarea>
                        <div class="flex gap-2 mt-2">
                            <button onclick="sendReply(${review.id})" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-xl font-bold text-xs">💾 Сохранить</button>
                            <button onclick="toggleReplyBox(${review.id})" class="px-3 bg-slate-200 hover:bg-slate-300 text-slate-700 py-2 rounded-xl font-bold text-xs">Отмена</button>
                        </div>
                    </div>
                    <div class="flex gap-2" id="reply-actions-${review.id}">
                        <button onclick="toggleReplyBox(${review.id})" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-xl font-bold text-xs border border-slate-300">✏️ ${hasAnswer ? 'Изменить ответ' : 'Добавить ответ'}</button>
                        <button onclick="deleteReview(${review.id})" class="px-3 bg-red-500 hover:bg-red-600 text-white py-2 rounded-xl font-bold text-xs">🗑️</button>
                    </div>
                </div>`;
            const statusBadge = isPending
                ? `<span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-lg text-[10px] font-black uppercase">⏳ Ожидает</span>`
                : `<span class="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-lg text-[10px] font-black uppercase">✅ Одобрен</span>`;
            card.innerHTML = `
                <div class="flex items-start justify-between gap-2">
                    <div class="min-w-0">
                        <p class="font-black text-slate-900 truncate">${esc(review.author_name)}</p>
                        <p class="text-amber-500 text-sm leading-none mt-0.5">${stars(review.rating)}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        ${statusBadge}
                        <p class="text-[10px] text-slate-400 mt-1" title="${fullDate(review.created_at)}">${prettyDate(review.created_at)}</p>
                    </div>
                </div>
                <p class="text-sm text-slate-700 mt-2 whitespace-pre-wrap break-words">${esc(review.text)}</p>
                ${answerBlock}${actionsBlock}`;
            container.appendChild(card);
        });
    }
    function toggleReplyBox(id) {
        const e = document.getElementById(`reply-edit-${id}`);
        const a = document.getElementById(`reply-actions-${id}`);
        if (!e) return;
        const open = e.classList.contains('hidden');
        e.classList.toggle('hidden');
        if (a) a.classList.toggle('hidden');
        if (open) { const t = document.getElementById(`reply-${id}`); if (t) t.focus(); }
    }
    function toggleArchive() { showFullArchive = !showFullArchive; renderReviews(); }
    async function approveReview(id) {
        try { const r = await fetch(`${API_URL}/api/reviews/${id}/approve`, { method:'PUT', headers:{'ngrok-skip-browser-warning':'true'} }); await handleAdminResponse(r); }
        catch(e){ alert('❌ Ошибка сети'); }
    }
    async function sendReply(id) {
        const t = document.getElementById(`reply-${id}`);
        const a = t ? t.value.trim() : '';
        if (!a) { alert('Напишите текст ответа'); return; }
        try { const r = await fetch(`${API_URL}/api/reviews/${id}/reply`, { method:'PUT', headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'}, body: JSON.stringify({admin_answer:a}) }); await handleAdminResponse(r); }
        catch(e){ alert('❌ Ошибка сети'); }
    }
    async function deleteReview(id) {
        if (!confirm('Удалить этот отзыв навсегда?')) return;
        try { const r = await fetch(`${API_URL}/api/reviews/${id}`, { method:'DELETE', headers:{'ngrok-skip-browser-warning':'true'} }); await handleAdminResponse(r); }
        catch(e){ alert('❌ Ошибка сети'); }
    }
    window.addEventListener('DOMContentLoaded', () => {
        const saved = sessionStorage.getItem('session_role');
        if (saved) { currentRole = saved; enterApp(); }
        else { document.getElementById('login-code').focus(); }
    });
</script>
</body>
</html>
