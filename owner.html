<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Модератор PRO — Владелец</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-scale { transition: transform 0.1s ease, box-shadow 0.1s ease; }
        .active-scale:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 sm:p-6 font-sans text-slate-800 antialiased flex flex-col items-center justify-center pb-20">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-200 p-6 sm:p-8">
        
        <!-- Шапка -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse shadow-sm"></div>
                <h1 class="text-lg font-black tracking-tight text-slate-900">Модератор <span class="bg-amber-400 text-amber-950 px-2 py-0.5 rounded-lg text-[10px] ml-1">PRO</span></h1>
            </div>
        </div>

        <!-- Заголовок -->
        <div class="text-center mb-8">
            <p class="text-4xl sm:text-5xl font-black tracking-tight text-slate-900 mb-2">Владелец</p>
            <div class="mx-auto w-12 h-1.5 rounded-full bg-amber-400"></div>
        </div>

        <!-- Кнопки-модули -->
        <div class="space-y-4">
            
            <button onclick="window.location.href='admin.html'" class="active-scale w-full flex items-center gap-4 p-4 rounded-2xl border-2 border-slate-100 bg-white shadow-sm hover:border-emerald-200 hover:shadow-md text-left">
                <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-emerald-100 text-2xl shadow-inner">🛡️</div>
                <div class="flex-1">
                    <p class="font-extrabold text-slate-900 text-lg">Рабочая Панель</p>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">Модерация отзывов и заявок</p>
                </div>
                <span class="text-slate-300 text-2xl font-light">›</span>
            </button>

            <button onclick="alert('Модуль Архива в разработке (Этап 7)')" class="active-scale w-full flex items-center gap-4 p-4 rounded-2xl border-2 border-slate-100 bg-white shadow-sm hover:border-amber-200 hover:shadow-md text-left opacity-80">
                <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-amber-100 text-2xl shadow-inner">📦</div>
                <div class="flex-1">
                    <p class="font-extrabold text-slate-900 text-lg">Сейф-Архив</p>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">Хранилище истории и лидов</p>
                </div>
                <span class="text-slate-300 text-2xl font-light">›</span>
            </button>

            <button onclick="alert('Модуль Управления Персоналом в разработке')" class="active-scale w-full flex items-center gap-4 p-4 rounded-2xl border-2 border-slate-100 bg-white shadow-sm hover:border-sky-200 hover:shadow-md text-left opacity-80">
                <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-sky-100 text-2xl shadow-inner">👥</div>
                <div class="flex-1">
                    <p class="font-extrabold text-slate-900 text-lg">Команда</p>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">Доступы и графики смен</p>
                </div>
                <span class="text-slate-300 text-2xl font-light">›</span>
            </button>

        </div>

        <p class="text-center text-[10px] text-slate-400 mt-8 tracking-wider uppercase font-bold">Управленческий хаб</p>
    </div>

</body>
</html>
