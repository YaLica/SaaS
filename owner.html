<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Модератор PRO — Владелец</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
button:active { transform: scale(0.98); }
.plate { transition: transform .18s ease, box-shadow .18s ease; }
.plate:hover { transform: translateY(-2px); }
</style>
</head>
<body class="bg-slate-100 min-h-screen p-4 sm:p-6 font-sans text-slate-800 antialiased">

<div class="max-w-md mx-auto mt-6 bg-white rounded-3xl shadow-md border border-slate-200 p-6 sm:p-8">

    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-2">
            <div class="w-3.5 h-3.5 rounded-full bg-emerald-500 animate-pulse"></div>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-900">Модератор <span class="text-amber-500">PRO</span></h1>
        </div>
    </div>

    <div class="text-center mb-7">
        <p class="text-4xl sm:text-5xl font-black tracking-tight text-slate-900">Владелец</p>
        <div class="mx-auto mt-2 w-16 h-[3px] rounded-full bg-amber-400"></div>
    </div>

    <div class="space-y-3">
        <button onclick="window.location.href='admin.html'" class="plate w-full flex items-center gap-4 p-4 rounded-2xl border border-slate-200 bg-white shadow-sm hover:shadow-md text-left">
            <div class="w-11 h-11 flex items-center justify-center rounded-xl bg-emerald-100 text-2xl">🛡️</div>
            <div class="flex-1">
                <p class="font-extrabold text-slate-900">Админка</p>
                <p class="text-xs text-slate-500">Отзывы, заявки, запись</p>
            </div>
            <span class="text-slate-300 text-xl">›</span>
        </button>

        <button onclick="window.location.href='archive.html'" class="plate w-full flex items-center gap-4 p-4 rounded-2xl border border-slate-200 bg-white shadow-sm hover:shadow-md text-left">
            <div class="w-11 h-11 flex items-center justify-center rounded-xl bg-amber-100 text-2xl">📦</div>
            <div class="flex-1">
                <p class="font-extrabold text-slate-900">Архив</p>
                <p class="text-xs text-slate-500">История и хранилище</p>
            </div>
            <span class="text-slate-300 text-xl">›</span>
        </button>

        <button onclick="window.location.href='roles.html'" class="plate w-full flex items-center gap-4 p-4 rounded-2xl border border-slate-200 bg-white shadow-sm hover:shadow-md text-left">
            <div class="w-11 h-11 flex items-center justify-center rounded-xl bg-indigo-100 text-2xl">👥</div>
            <div class="flex-1">
                <p class="font-extrabold text-slate-900">Роли для сотрудников</p>
                <p class="text-xs text-slate-500">Доступы и статусы команды</p>
            </div>
            <span class="text-slate-300 text-xl">›</span>
        </button>
    </div>

    <p class="text-center text-[10px] text-slate-400 mt-7 tracking-wide uppercase">Модератор PRO • Панель владельца</p>
</div>

</body>
</html>
